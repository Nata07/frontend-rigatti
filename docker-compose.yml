services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: frontend-app
    ports:
      - "${FRONTEND_PORT}:80"
    networks:
      - frontend_network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

networks:
  frontend_network:
    driver: bridge
